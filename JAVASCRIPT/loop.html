<html>
    <head>
        <title>LOOP</title>
    </head>

    <body>
        <h2>FOR LOOP</h2>
        <p id="ex"></p>
        <script>
            let text = ""
            for(let i=1; i<=10; i++) {
                text += "Number " + i + "<br>"
            }

            document.getElementById("ex").innerHTML = text
        </script>
    </body>
</html>
