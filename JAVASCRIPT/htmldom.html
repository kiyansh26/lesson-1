<html>
    <head>
        <title>DOM</title>
        <style>
            h1{
                color:blueviolet;
            }

        </style>
    </head>

    <body>
        <h1 id = "heading">HELLO</h1>
        <button onclick="changeText()">Click here</button>

        <script>
            function changeText(){
                let element = document.getElementById("heading")
                element.innerHTML = "text changed to DOM"
                element.style.color="red"
            }
        </script>
    </body>
</html>
