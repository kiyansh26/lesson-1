<html>
    <head>
        <title>Switch in Javascript</title>
    </head>

    <body>
        <h2>Switch Example</h2>
        <p id = "ex"></p>

        <script>
            let day=3
            let result;

            switch(day) {
                case 1:
                    result = "Monday"
                case 2:
                    result = "Tuesday"
                case 3:
                    result = "Wednesday"
                default:
                    result = "unknown day"

            }
            document.getElementById("ex").innerHTML = result
        </script>
    </body>
</html>
