<html>
    <head>
        <title>Method in javascript</title>
    </head>

    <body>
        <h2>String methods in Examples</h2>
        <p id="demo"></p>
        <p id="example"></p>

        <script>
            let msg = "hello world"
            let answer = msg.toUpperCase()
            document.getElementById("demo").innerHTML = answer

            let reverse = msg.split("").reverse().join("")
            document.getElementById("example").innerHTML = reverse
        </script>

    </body>
</html>
