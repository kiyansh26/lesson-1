<html>
    <head>
        <title>opacity</title>
        <style>
            .opacity{
                width: 200px;
                height: 200px;
                background-color: blue;
                opacity: 0.5;
                text-align: center;
            }
            img{
                opacity: 0.5;
                width: 150px;
            }
            img:hover{
                opacity: 1.0;
            }
        </style>
    </head>

    <body>
        <div class="opacity">Hi</div>
        <img src="dog.png">
        
        
    </body>
</html>
