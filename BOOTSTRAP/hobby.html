<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hobby Section</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }

    .hobby-card {
      height: 120px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: white;
      transition: 0.3s;
    }

    .hobby-card:hover {
      transform: scale(1.05);
    }

    .bg1 { background-color: #ff6b6b; }
    .bg2 { background-color: #4ecdc4; }
    .bg3 { background-color: #1a535c; }
    .bg4 { background-color: #ffa600; }
    .bg5 { background-color: #6a4c93; }
    .bg6 { background-color: #1982c4; }
  </style>
</head>

<body>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Hobby</h2>

    <div class="row g-4">

      <div class="col-md-4">
        <div class="hobby-card bg1">Art</div>
      </div>

      <div class="col-md-4">
        <div class="hobby-card bg2">Reading</div>
      </div>

      <div class="col-md-4">
        <div class="hobby-card bg3">Music</div>
      </div>

      <div class="col-md-4">
        <div class="hobby-card bg4">Gardening</div>
      </div>

      <div class="col-md-4">
        <div class="hobby-card bg5">Photography</div>
      </div>

      <div class="col-md-4">
        <div class="hobby-card bg6">Travel</div>
      </div>

    </div>
  </div>

</body>
</html>
